<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340" fill="none" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1e"/>
      <stop offset="0.5" stop-color="#0b1226"/>
      <stop offset="1" stop-color="#060812"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.35" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#1b2540" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="340" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="340" rx="20" fill="url(#grid)"/>
  <rect width="1280" height="340" rx="20" fill="url(#glow)"/>
  <rect x="1" y="1" width="1278" height="338" rx="19" fill="none" stroke="#22304f" stroke-width="1.5"/>

  <!-- top accent bar -->
  <rect x="24" y="24" width="150" height="6" rx="3" fill="url(#accent)"/>

  <!-- traffic dots -->
  <circle cx="1184" cy="30" r="6" fill="#ef4444"/>
  <circle cx="1206" cy="30" r="6" fill="#f59e0b"/>
  <circle cx="1228" cy="30" r="6" fill="#22c55e"/>

  <!-- eyebrow -->
  <text x="26" y="86" font-family="'SFMono-Regular', Consolas, monospace" font-size="17" letter-spacing="6" fill="#7dd3fc" font-weight="600">SATVIK-KESARWANI // AI COMMAND CENTER</text>

  <!-- name -->
  <text x="24" y="168" font-size="76" font-weight="800" fill="#f8fafc" letter-spacing="-1">Satvik Kesarwani</text>

  <!-- subtitle -->
  <text x="26" y="212" font-family="'SFMono-Regular', Consolas, monospace" font-size="21" fill="#cbd5e1" letter-spacing="1">LLM systems <tspan fill="#a78bfa">/</tspan> AI agents <tspan fill="#a78bfa">/</tspan> RAG pipelines <tspan fill="#a78bfa">/</tspan> GenAI apps</text>

  <!-- status chips -->
  <g font-family="'SFMono-Regular', Consolas, monospace" font-size="15">
    <rect x="26" y="248" width="215" height="40" rx="12" fill="#0e1830" stroke="#22c55e" stroke-opacity="0.35"/>
    <circle cx="52" cy="268" r="5" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="68" y="273" fill="#86efac">llm systems online</text>

    <rect x="253" y="248" width="180" height="40" rx="12" fill="#0e1830" stroke="#38bdf8" stroke-opacity="0.35"/>
    <circle cx="279" cy="268" r="5" fill="#38bdf8">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <text x="295" y="273" fill="#7dd3fc">agents active</text>

    <rect x="445" y="248" width="200" height="40" rx="12" fill="#0e1830" stroke="#a78bfa" stroke-opacity="0.35"/>
    <circle cx="471" cy="268" r="5" fill="#a78bfa">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <text x="487" y="273" fill="#c4b5fd">shipping GenAI</text>
  </g>

  <!-- orbit graphic -->
  <g transform="translate(1050 175)">
    <circle r="110" fill="#6366f1" opacity="0.06" filter="url(#soft)"/>
    <circle r="46" fill="none" stroke="#334155" stroke-width="1.2"/>
    <circle r="72" fill="none" stroke="#334155" stroke-width="1.2" stroke-dasharray="3 6"/>
    <circle r="98" fill="none" stroke="#334155" stroke-width="1.2" stroke-dasharray="2 10"/>
    <circle r="10" fill="url(#accent)"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
      <circle cx="72" cy="0" r="6" fill="#38bdf8"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="9s" repeatCount="indefinite"/>
      <circle cx="46" cy="0" r="4.5" fill="#f472b6"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="120" to="480" dur="16s" repeatCount="indefinite"/>
      <circle cx="98" cy="0" r="5" fill="#a78bfa"/>
    </g>
  </g>
</svg>
